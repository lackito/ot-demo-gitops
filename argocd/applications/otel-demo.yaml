apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: otel-demo
  namespace: argocd

spec:

  project: default

  sources:

  - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-demo
    targetRevision: 0.38.4

    helm:
      valueFiles:
        - $values/applications/otel-demo/values.yaml


  - repoURL: https://github.com/lackito/ot-demo-gitops.git
    targetRevision: main
    ref: values


  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry-demo


  syncPolicy:

    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
